.api-base:
  image: python:3.13-slim
  before_script:
    - pip install uv
    - cd apps/api
    - uv sync

api:lint:
  extends: .api-base
  stage: lint
  script:
    - uv run ruff check src tests
    - uv run black --check src tests
    - uv run mypy src
  rules:
    - changes:
        - apps/api/**/*

api:test:
  extends: .api-base
  stage: test
  script:
    - uv run pytest --cov=src
  rules:
    - changes:
        - apps/api/**/*

api:build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  script:
    - docker build -t passhub-api:$CI_COMMIT_SHORT_SHA apps/api
  rules:
    - changes:
        - apps/api/**/*
